<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Color Generator</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="outerContainer">
      <div class="Card">
        <div class="icons">
       <button class="icon-button"> <i class="fa-solid fa-palette"></i></button>  
         <button class="icon-button"><i class="fa-regular fa-sun"></i></button> 
        </div>
        <h2 class="heading">Random Color Generator</h2>
        <h3 class="subheading">Generate beautiful colors instantly<i class="fa-regular fa-star"></i></h3>

        <div className="colorBox">
          <div class="colorpreview"><p class="hex-value-display">#4F46E5</p></div>
        </div>

        <button class="btn">Generate New Color</button>
        <div class="values">
          <div class="value">
            <p class="secheading">RGB</p>
            <p class="secval rgb-color-display">79, 70, 229</p>
         <button class="clipboard"><i class="fa-solid fa-clipboard  rgb-copy"></i></button>   
          </div>
          <div class="value">
            <p class="secheading">Hex</p>
            <p class="secval hex-value-display">#4F46E5</p>
     
           <button class="clipboard"><i class="fa-solid fa-clipboard hex-copy"></i></button>  

          </div>
        </div>
        <p class="tip"><i class="fa-regular fa-lightbulb"></i>&nbsp;Tip: Click on Clipboard to copy the color code</p>
      </div>

    </div>

    <script src="app.js"></script>
  </body>
</html>
